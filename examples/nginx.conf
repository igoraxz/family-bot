# Nginx reverse proxy template for Family Bot
# Replace YOUR_DOMAIN with your actual domain name
# Replace BOT_PORT with your bot's port (default: 8000)
#
# Example: bot.smith-family.com → localhost:8000
#
# SSL setup with certbot:
#   sudo certbot --nginx -d YOUR_DOMAIN

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name YOUR_DOMAIN;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    # Telegram webhook
    location /webhook/telegram {
        proxy_pass http://127.0.0.1:BOT_PORT;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vapi phone call events webhook
    location /call/events {
        proxy_pass http://127.0.0.1:BOT_PORT;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check
    location /health {
        proxy_pass http://127.0.0.1:BOT_PORT;
    }

    # Block everything else
    location / {
        return 404;
    }
}
